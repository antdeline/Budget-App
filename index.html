         return (<div key={i} onClick={()=>openTx(i)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",marginBottom:"3px",background:T.s,borderRadius:"12px",border:`1px solid ${T.br}`,cursor:"pointer"}}><div><span style={{fontSize:"13px",fontWeight:500}}>{tx.store}</span>{tx.cat && <span style={{fontSize:"9px",marginLeft:"6px",padding:"2px 6px",borderRadius:"8px",background:T.al,color:T.ad,fontWeight:600}}>{tx.cat}</span>}{tx.note && <div style={{fontSize:"10px",color:T.td,fontStyle:"italic"}}>{tx.note}</div>}</div><span style={{fontSize:"13px",fontWeight:700,color:T.ad,flexShrink:0,marginLeft:"8px"}}>{fmt(tx.amt)}</span></div>);
       })}
<div style={{display:"flex",justifyContent:"space-between",padding:"12px 14px",marginTop:"8px",background:T.hbg,borderRadius:"14px"}}><span style={{fontWeight:700,color:T.ht}}>TOTAL</span><span style={{fontWeight:700,color:T.ht}}>{fmt(txT)}</span></div>
</div>

   {tab==="wish" && (
<div className="fade">
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}><div style={{fontSize:"16px",fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:T.a}}>{"\u273F"} wish list {"\u273F"}</div><Btn T={T} onClick={()=>setAW(true)} label="+ add" primary /></div>
       {aW && (<div style={{padding:"14px",marginBottom:"10px",background:T.c,borderRadius:"16px",border:`1px solid ${T.a}33`}}><input value={nWN} onChange={e=>setNWN(e.target.value)} placeholder="Item name..." style={is_} /><input value={nWP} onChange={e=>setNWP(e.target.value)} placeholder="Price (optional)..." type="number" style={is_} /><div style={{display:"flex",gap:"8px"}}><button onClick={()=>{if(!nWN)return;const u={...months};u[cm]={...u[cm],wishList:[...u[cm].wishList,{item:nWN,price:parseFloat(nWP)||null,checked:false}]};save(u);setNWN("");setNWP("");setAW(false);}} style={{flex:1,padding:"10px",background:T.a,borderRadius:"20px",color:"white",fontSize:"12px",fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit"}}>add</button><Btn T={T} onClick={()=>setAW(false)} label="cancel" /></div></div>)}
       {data.wishList.map((w, i) => {
         if (eW === i) return (<div key={i} style={{padding:"12px",marginBottom:"4px",background:T.c,borderRadius:"14px",border:`1px solid ${T.a}33`}}><input value={eWN} onChange={e=>setEWN(e.target.value)} style={is_} /><input value={eWP} onChange={e=>setEWP(e.target.value)} type="number" placeholder="Price..." style={is_} /><div style={{display:"flex",gap:"6px"}}><button onClick={()=>{const u={...months};const wl=[...u[cm].wishList];wl[i]={...wl[i],item:eWN,price:parseFloat(eWP)||null};u[cm]={...u[cm],wishList:wl};save(u);setEW(null);}} style={{flex:1,padding:"8px",background:T.a,borderRadius:"16px",color:"white",fontSize:"11px",fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit"}}>save</button><Btn T={T} onClick={()=>setEW(null)} label="cancel" /><Btn T={T} onClick={()=>{const u={...months};const wl=[...u[cm].wishList];wl.splice(i,1);u[cm]={...u[cm],wishList:wl};save(u);setEW(null);}} label="delete" danger /></div></div>);
         return (<div key={i} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",marginBottom:"3px",background:w.checked?T.al+"44":T.s,borderRadius:"12px",border:`1px solid ${w.checked?T.a+"33":T.br}`}}><button onClick={()=>togWish(i)} style={{width:"22px",height:"22px",borderRadius:"50%",border:`2px solid ${w.checked?T.a:T.a+"55"}`,background:w.checked?T.a:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0,cursor:"pointer"}}>{w.checked && <span style={{color:"white",fontSize:"11px"}}>{"\u2713"}</span>}</button><span onClick={()=>{setEW(i);setEWN(w.item);setEWP(w.price?w.price.toString():"");}} style={{flex:1,fontSize:"13px",fontWeight:500,textDecoration:w.checked?"line-through":"none",opacity:w.checked?0.4:1,cursor:"pointer"}}>{w.item}</span>{w.price && <span style={{fontSize:"12px",color:T.a,fontWeight:600}}>{fmt(w.price)}</span>}</div>);
       })}
       {sur > 0 && (<div style={{marginTop:"14px",padding:"16px",background:T.al+"44",borderRadius:"16px",textAlign:"center"}}><div style={{fontSize:"10px",color:T.ad,fontWeight:600,letterSpacing:"1px"}}>SURPLUS</div><div style={{fontSize:"22px",fontWeight:700,color:T.ad,marginTop:"4px"}}>{fmt(sur)}</div></div>)}
</div>
   )}
   {tab==="debt" && (
<div className="fade" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
<div style={{textAlign:"center"}}><div style={{fontSize:"10px",letterSpacing:"2px",color:T.td,fontWeight:600}}>APPLE CARD PAYDOWN</div></div>
<div style={{...cs,textAlign:"center"}}>
<div style={{fontSize:"9px",color:T.td,letterSpacing:"2px",fontWeight:600}}>BALANCE</div>
         {!eDbt ? (<div onClick={()=>setEDbt(true)} style={{cursor:"pointer"}}><div style={{fontSize:"28px",fontWeight:700,color:T.dn}}>{fmt(dBal)}</div><div style={{fontSize:"11px",color:T.td,marginTop:"4px"}}>of {fmt(dLim)} {"\u00B7"} {dAPR}% APR</div></div>) : (<div><input value={dBal} onChange={e=>setDBal(parseFloat(e.target.value)||0)} type="number" style={{...is_,fontSize:"20px",fontWeight:700,textAlign:"center",color:T.dn,border:`2px solid ${T.a}`}} /><div style={{display:"flex",gap:"6px"}}><div style={{flex:1}}><div style={{fontSize:"8px",color:T.td,fontWeight:600}}>APR%</div><input value={dAPR} onChange={e=>setDAPR(parseFloat(e.target.value)||0)} type="number" style={{...is_,textAlign:"center"}} /></div><div style={{flex:1}}><div style={{fontSize:"8px",color:T.td,fontWeight:600}}>LIMIT</div><input value={dLim} onChange={e=>setDLim(parseFloat(e.target.value)||0)} type="number" style={{...is_,textAlign:"center"}} /></div></div><Btn T={T} onClick={()=>{setEDbt(false);saveDebtState(dBal,dAPR,dPay,dLim);}} label="done" primary /></div>)}
</div>
<div style={cs}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><span style={{fontSize:"10px",color:T.td,fontWeight:600}}>PAID OFF</span><span style={{fontSize:"10px",color:T.a,fontWeight:700}}>{fmt(po>0?po:0)} {"\u00B7"} {pp}%</span></div><div style={{height:"10px",background:T.al,borderRadius:"5px",overflow:"hidden"}}><div style={{height:"100%",width:pp+"%",background:`linear-gradient(90deg,${T.a},${T.ad})`,borderRadius:"5px",transition:"width 0.4s"}} /></div></div>
<div style={cs}><div style={{fontSize:"10px",color:T.td,fontWeight:600,letterSpacing:"1px",marginBottom:"8px"}}>YOUR {fmt(dPay)} PAYMENT</div><div style={{display:"flex",gap:"8px",marginBottom:"8px"}}><div style={{flex:1,padding:"10px",background:T.dn+"15",borderRadius:"12px",textAlign:"center"}}><div style={{fontSize:"8px",color:T.dn,fontWeight:600}}>{"\u2192"} INTEREST</div><div style={{fontSize:"16px",fontWeight:700,color:T.dn}}>{fmt(mi)}</div></div><div style={{flex:1,padding:"10px",background:T.a+"15",borderRadius:"12px",textAlign:"center"}}><div style={{fontSize:"8px",color:T.a,fontWeight:600}}>{"\u2192"} BALANCE</div><div style={{fontSize:"16px",fontWeight:700,color:T.a}}>{fmt(pp2>0?pp2:0)}</div></div></div><div style={{fontSize:"11px",color:T.td,textAlign:"center",fontStyle:"italic"}}>{Math.round((mi/dPay)*100)}% goes to interest</div></div>
<div style={{...cs,textAlign:"center"}}><div style={{fontSize:"10px",color:T.td,fontWeight:600,letterSpacing:"1px"}}>PROJECTED PAYOFF</div><div style={{fontSize:"20px",fontWeight:700,color:T.a}}>{ps}</div><div style={{fontSize:"11px",color:T.td,marginTop:"4px"}}>{curPay.m} months {"\u00B7"} {fmt(curPay.ti)} interest</div></div>
<div style={cs}><div style={{fontSize:"10px",color:T.td,fontWeight:600,letterSpacing:"1px",marginBottom:"8px"}}>ADJUST PAYMENT</div><div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}><span style={{fontSize:"11px",color:T.td}}>$150</span><input type="range" min={150} max={500} step={25} value={dPay} onChange={e=>{const v=parseInt(e.target.value);setDPay(v);saveDebtState(dBal,dAPR,v,dLim);}} style={{flex:1,accentColor:T.a}} /><span style={{fontSize:"11px",color:T.td}}>$500</span></div><div style={{textAlign:"center",fontSize:"18px",fontWeight:700,color:T.a}}>{fmt(dPay)}/mo</div></div>
</div>
   )}
</div>
<div style={{textAlign:"center",padding:"24px 0 36px"}}><div style={{fontSize:"16px",opacity:0.25,letterSpacing:"6px"}}>{T.d}</div></div>
</div>

);
